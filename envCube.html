<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>20215226 이한석 - Cube Mapping</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div style="width: 512px; text-align: center;">
        Subdivision Level: 1 <input type="range" id="level" value="1" min="1" max="5" step="1"> 5
    </div>
    <canvas id="myCanvas">
        Oops... your browser doesn't support the HTML5 canvas element!
    </canvas>

    <script type="x/shader/x-vertex" id="EnvTexVS">
        varying vec3 fNormal, fWorldPos;

        void main(){
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);

            //fNormal = normalize(normalMatrix * normal);
            //fWorldPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
            fNormal = normalize(normal);
            fWorldPos = position;
        }
    </script>

    <script type="x/shader/x-fragment" id="EnvTexFS">
        precision mediump float;

        varying vec3 fNormal, fWorldPos;
        uniform samplerCube texImage;

        void main(){
            vec3 N = normalize(fNormal);
            vec3 V = normalize(-fWorldPos);
            vec3 R = reflect(V, N);

            gl_FragColor = textureCube(texImage, R);
        }
    </script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three/build/three.module.js",
            "three/addons/": "https://unpkg.com/three/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

        let scene, camera, renderer, controls, mesh;
        var vPosition = [];
        var subLevel = 1;

        const vA = new THREE.Vector3(0.0, 0.0, 1.0);
        const vB = new THREE.Vector3(0.0, 0.942809, -0.333333);
        const vC = new THREE.Vector3(-0.816497, -0.471405, -0.333333);
        const vD = new THREE.Vector3(0.816497, -0.471405, -0.333333);

        init();
        render();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x808080);

            const viewLength = 2;
            if (window.innerWidth > window.innerHeight) {
                var ratio = viewLength * window.innerWidth / window.innerHeight;
                camera = new THREE.OrthographicCamera(-ratio, ratio, viewLength, -viewLength, 0, 1000);
            } else {
                var ratio = viewLength * window.innerHeight / window.innerWidth;
                camera = new THREE.OrthographicCamera(-viewLength, viewLength, ratio, -ratio, 0, 1000);
            }
            camera.position.z = 1;

            var canvas = document.getElementById("myCanvas");
            renderer = new THREE.WebGLRenderer({ canvas });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(render);

            controls = new TrackballControls(camera, renderer.domElement);

            /*const vertices = new Float32Array([
                -0.5, -0.5, -0.5,
                 0.5, -0.5, -0.5,
                 0.5,  0.5, -0.5,
                -0.5,  0.5, -0.5,
                -0.5, -0.5,  0.5,
                 0.5, -0.5,  0.5,
                 0.5,  0.5,  0.5,
                -0.5,  0.5,  0.5,
            ]);

            const normals = new Float32Array([
                -0.57735, -0.57735, -0.57735,
                 0.57735, -0.57735, -0.57735,
                 0.57735,  0.57735, -0.57735,
                -0.57735,  0.57735, -0.57735,
                -0.57735, -0.57735,  0.57735,
                 0.57735, -0.57735,  0.57735,
                 0.57735,  0.57735,  0.57735,
                -0.57735,  0.57735,  0.57735,
            ]);

            const indices = [ 
                1, 0, 3, 1, 3, 2,
                2, 3, 7, 2, 7, 6,
                3, 0, 4, 3, 4, 7,
                4, 5, 6, 4, 6, 7,
                5, 4, 0, 5, 0, 1,
                6, 5, 1, 6, 1, 2,
            ];

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            geometry.setIndex(indices);*/

            const vertices = new Float32Array([
                vA.x, vA.y, vA.z, vB.x, vB.y, vB.z, vC.x, vC.y, vC.z,
                vA.x, vA.y, vA.z, vC.x, vC.y, vC.z, vD.x, vD.y, vD.z,
                vA.x, vA.y, vA.z, vD.x, vD.y, vD.z, vB.x, vB.y, vB.z,
                vD.x, vD.y, vD.z, vC.x, vC.y, vC.z, vB.x, vB.y, vB.z,
            ]);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('normal', new THREE.Float32BufferAttribute(vertices, 3));

              const texture = new THREE.CubeTextureLoader().load([ 
                'images/LobbyXNeg.bmp',
                'images/LobbyXPos.bmp',
                'images/LobbyYNeg.bmp',
                'images/LobbyYPos.bmp',
                'images/LobbyZNeg.bmp',
                'images/LobbyZPos.bmp'
            ]);

            const material = new THREE.ShaderMaterial({
                uniforms : {
                    texImage : { value : texture },
                },
                vertexShader : document.getElementById("EnvTexVS").textContent,
                fragmentShader : document.getElementById("EnvTexFS").textContent
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);

            document.getElementById("level").onchange = function(event) {
                subLevel = event.target.value;
                subdivide(subLevel);
            }
        }

        function onWindowResize() {
            const viewLength = 2;
            if (window.innerWidth > window.innerHeight) {
                var ratio = viewLength * window.innerWidth / window.innerHeight;
                camera = new THREE.OrthographicCamera(-ratio, ratio, viewLength, -viewLength, 0, 1000);
            } else {
                var ratio = viewLength * window.innerHeight / window.innerWidth;
                camera = new THREE.OrthographicCamera(-viewLength, viewLength, ratio, -ratio, 0, 1000);
            }
            camera.position.z = 1;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);

            controls.dispose();
            controls = new TrackballControls(camera, renderer.domElement);
        }

        function render() {
            controls.update();

            renderer.render(scene, camera);
        }

        function subdivide(level) {
            vPosition = [];

            divideTriangle(vA, vB, vC, level);
            divideTriangle(vA, vC, vD, level);
            divideTriangle(vA, vD, vB, level);
            divideTriangle(vD, vC, vB, level);

            var vertices = new Float32Array(vPosition.length * 3);
            for (var i=0; i<vPosition.length; i++) {
                vertices[i*3] = vPosition[i].x;
                vertices[i*3+1] = vPosition[i].y;
                vertices[i*3+2] = vPosition[i].z;
            }

            const material = mesh.material;
            mesh.geometry.dispose();
            scene.remove(mesh);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('normal', new THREE.Float32BufferAttribute(vertices, 3));

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
        }

        function divideTriangle(a, b, c, level) {
            if (level > 1) {
                var ab = new THREE.Vector3().addVectors(a, b);
                var bc = new THREE.Vector3().addVectors(b, c);
                var ca = new THREE.Vector3().addVectors(c, a);
                ab.normalize();
                bc.normalize();
                ca.normalize();

                divideTriangle(ca, a, ab, level-1);
                divideTriangle(ab, b, bc, level-1);
                divideTriangle(bc, c, ca, level-1);
                divideTriangle(ab, bc, ca, level-1);
            }
            else {
                vPosition.push(a);
                vPosition.push(b);
                vPosition.push(c);
            }
        }
    </script>
</body>
</html>
