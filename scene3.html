         <script type="x-shader/x-vertex" id="phongVS">
            attribute vec3 vColor;
            varying vec4 fColor;
            varying vec3 fNormal, fWorldPos;

            void main(){
                fColor = vec4(vColor, 1);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1);

                fNormal = normalize(normalMatrix * normal);
                fWorldPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
            }
        </script>
        <script type="x-shader/x-vertex" id="phongFogFSDirect">
            precision mediump float;

            varying vec4 fColor;
            varying vec3 fNormal, fWorldPos;
            uniform vec4 fogColor;

            uniform vec3 lightSrc;
            uniform vec4 lightAmbient, lightDiffuse, lightSpecular;
            uniform vec4 matAmbient, matDiffuse, matSpecular;
            uniform float matShininess;
            
            void main() {
                vec4 ambient = lightAmbient * matAmbient;

                vec3 N = normalize(fNormal);
                vec3 L = normalize(lightSrc);
                float kd = max(dot(L,N), 0.0);
                vec4 diffuse = kd * lightDiffuse * matDiffuse;

                vec3 V = normalize(-fWorldPos);
                vec3 H = normalize(L + V);
                float ks = pow(max(dot(N, H), 0.0), matShininess);
                vec4 specular = ks * lightSpecular * matSpecular;

                float fogDepth = length(-fWorldPos);
                float fogFactor = smoothstep(2.0, 10.0, fogDepth);

                vec4 color = ambient + diffuse + specular;
                gl_FragColor = mix(color, fogColor, fogFactor);

                //gl_FragColor = ambient + diffuse + specular;
                gl_FragColor.a = 1.0;
            }
        </script>
        <script type="x-shader/x-vertex" id="phongFSPoint">
            precision mediump float;

            varying vec4 fColor;
            varying vec3 fNormal, fWorldPos;

            uniform vec3 lightSrc, kAtten;
            uniform vec4 lightAmbient, lightDiffuse, lightSpecular;
            uniform vec4 matAmbient, matDiffuse, matSpecular;
            uniform float matShininess;
            
            void main() {
                vec4 ambient = lightAmbient * matAmbient;

                vec3 N = normalize(fNormal);
                vec3 lightVec = lightSrc - fWorldPos;
                vec3 L = normalize(lightVec);
                float kd = max(dot(L,N), 0.0);
                vec4 diffuse = kd * lightDiffuse * matDiffuse;

                vec3 V = normalize(-fWorldPos);
                vec3 H = normalize(L + V);
                float ks = pow(max(dot(N, H), 0.0), matShininess);
                vec4 specular = ks * lightSpecular * matSpecular;

                float d = length(lightVec);
                float atten = 1.0 / (kAtten[0] + kAtten[1]*d + kAtten[2]*d*d);

                gl_FragColor = ambient + atten* (diffuse + specular);
                gl_FragColor.a = 1.0;
            }
        </script>
        <script type="x-shader/x-fragment" id="phongFSSpot">
           precision mediump float;

           varying vec4 fColor;
           varying vec3 fNormal, fWorldPos;

           uniform vec3 lightSrc, kAtten, spotDir;
           uniform vec4 lightAmbient, lightDiffuse, lightSpecular;
           uniform vec4 matAmbient, matDiffuse, matSpecular;
           uniform float matShininess, spotExp;

            void main(){
                vec4 ambient = lightAmbient * matAmbient;

                vec3 N = normalize(fNormal);
                vec3 lightVec = lightSrc - fWorldPos;
                vec3 L = normalize(lightVec);
                float kd = max(dot(L,N), 0.0);
                vec4 diffuse = kd * lightDiffuse * matDiffuse;

                vec3 V = normalize(-fWorldPos);
                vec3 H = normalize(L + V);
                float ks = pow(max(dot(N, H), 0.0), matShininess);
                vec4 specular = ks * lightSpecular * matSpecular;

                float d = length(lightVec);
                float atten = 1.0 / (kAtten[0] + kAtten[1]*d + kAtten[2]*d*d);

                float spotDot = max(dot(normalize(spotDir), -L), 0.0);
                if(spotDot > 0.0)
                    atten *= pow(spotDot, spotExp);
                else
                    atten = 0.0;
                
                gl_FragColor = ambient + atten * (diffuse + specular);
                gl_FragColor.a = 1.0;
            }
        </script>

                lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(lineVertices, 3));

                const lineMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
                //lineMaterial.polygonOffset = true;
                //lineMaterial.polygonOffsetFactor = 1;
                //lineMaterial.polygonOffsetUnits = 1;

                const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
                scene.add(lines);
                
                window.addEventListener('resize', onWindowResize);
                window.addEventListener('keydown', onKeyDown);

                    const shading = document.getElementsByName("lighting");
                    shading.forEach((radio) => {
                    radio.addEventListener("change", (event) => {
                        if(document.getElementById("directional").checked){
                            lightingMode = 0;
                        }
                        else if(document.getElementById("point").checked){
                            lightingMode = 1;
                        }
                        else if(document.getElementById("spot").checked){
                            lightingMode = 2;
                        }

                        const groundGeometry = ground.geometry;
                        scene.remove(ground);

                        ground = new THREE.Mesh(groundGeometry, texMats[lightingMode]);
                        scene.add(ground);

                        const geometry = cubes[0].geometry;
                        cubes.forEach((cube) => {
                            scene.remove(cube);
                        });

                        const hexaGeometry = hexas[0].geometry;
                        hexas.forEach((hexa) =>{
                            scene.remove(hexa);
                        });
                
                        cubes = [];
                        hexas = [];
                        generateObjects(geometry, hexaGeometry);
                    });
                });
            }

            function generateObjects(geometry, hexaGeometry){
                const texture1 = new THREE.TextureLoader().load('images/crate.bmp');
                texture1.wrapS = THREE.RepeatWrapping;
                texture1.wrapT = THREE.RepeatWrapping;
                /*const texture2 = new THREE.TextureLoader().load('images/brick.bmp');
                texture2.wrapS = THREE.RepeatWrapping;
                texture2.wrapT = THREE.RepeatWrapping;*/

                var index = 0;
                for(var posZ=-5; posZ<0; posZ+=2){
                    cubes[index] = new THREE.Mesh(geometry, texMats[lightingMode].clone());
                    cubes[index].position.x = 3;
                    cubes[index].position.y = 1.0;
                    cubes[index].position.z = posZ;
                    //cubes[index].material.uniforms.matDiffuse.value = [1.0, 0.0, 0.0, 1.0];
                    cubes[index].material.uniforms.texImage.value = texture1;
                    scene.add(cubes[index]);

                    hexas[index] = new THREE.Mesh(hexaGeometry, materials[lightingMode].clone());
                    //hexas[index] = new THREE.Mesh(hexaGeometry, alphaMat.clone());
                    hexas[index].rotateZ(THREE.MathUtils.degToRad(180));
                    hexas[index].position.x = 3;
                    hexas[index].position.y = -0.5;
                    hexas[index].position.z = posZ;
                    hexas[index].material.uniforms.matDiffuse.value = [0.0, 0.0, 1.0, 1.0];
                    //hexas[index].material.uniforms.texImage.value = texture2;
                    scene.add(hexas[index]);
                    index++;

                    cubes[index] = new THREE.Mesh(geometry, texMats[lightingMode].clone());
                    cubes[index].position.x = -3;
                    cubes[index].position.y = 1.0;
                    cubes[index].position.z = posZ;
                    //cubes[index].material.uniforms.matDiffuse.value = [1.0, 0.0, 0.0, 1.0];
                    cubes[index].material.uniforms.texImage.value = texture1;
                    scene.add(cubes[index]);
                    
                    hexas[index] = new THREE.Mesh(hexaGeometry, materials[lightingMode].clone());
                    //hexas[index] = new THREE.Mesh(hexaGeometry, alphaMat.clone());
                    hexas[index].rotateZ(THREE.MathUtils.degToRad(180));
                    hexas[index].position.x = -3;
                    hexas[index].position.y = -0.5;
                    hexas[index].position.z = posZ;
                    hexas[index].material.uniforms.matDiffuse.value = [0.0, 0.0, 1.0, 1.0];
                    //hexas[index].material.uniforms.texImage.value = texture2;
                    scene.add(hexas[index]);
                    index++;
                }
            }

            function onWindowResize()
            {
                const aspectRatio = window.innerWidth / window.innerHeight;
                camera = new THREE.PerspectiveCamera(90, aspectRatio, 0.001, 1000);
                camera.position.x = cameraPosition.x;
                camera.position.y = cameraPosition.y;
                camera.position.z = cameraPosition.z;
                camera.lookAt(cameraPosition.x + cameraVector.x, 0, cameraPosition.z + cameraVector.z);
                camera.updateProjectionMatrix();

                renderer.setSize(window.innerWidth, window.innerHeight);

                //controls.dispose();
                //controls = new TrackballControls(camera, renderer.domElement);
                //controls = new OrbitControls(camera, renderer.domElement);
                //controls.maxPolarAngle = Math.PI / 2;
            }

            function onKeyDown(event) {
                var key = String.fromCharCode(event.keyCode);
                let s = Math.sin(0.1), c = Math.cos(0.1);
                var newX, newZ;
                switch(key) {
                    case 'a':
                    case 'A':
                        newX = c * cameraVector.x + s * cameraVector.z;
                        newZ = -s * cameraVector.x + c * cameraVector.z;
                        cameraVector.x = newX;
                        cameraVector.z = newZ;
                        break;
                    case 'd':
                    case 'D':
                        newX = c * cameraVector.x -s * cameraVector.z;
                        newZ = s * cameraVector.x + c * cameraVector.z;
                        cameraVector.x = newX;
                        cameraVector.z = newZ;
                        break;
                    case 's':
                    case 'S':
                        newX = cameraPosition.x - 0.1 * cameraVector.x;
                        newZ = cameraPosition.z - 0.1 * cameraVector.z;
                        if(newX > -10 && newX < 10 && newZ > -10 && newZ < 10){
                            camera.position.x = cameraPosition.x = newX;
                            camera.position.z = cameraPosition.z = newZ;
                        }
                        break;
                    case 'w':
                    case 'W':
                        newX = cameraPosition.x + 0.1 * cameraVector.x;
                        newZ = cameraPosition.z + 0.1 * cameraVector.z;
                        if(newX > -10 && newX < 10 && newZ > -10 && newZ < 10){
                            camera.position.x = cameraPosition.x = newX;
                            camera.position.z = cameraPosition.z = newZ;
                        }
                        break;
                }
                camera.lookAt(cameraPosition.x + cameraVector.x, 0, cameraPosition.z + cameraVector.z);
            }

            function render() {
                //controls.update();
                
                angle += 0.02;
                lightSrc[0] = 3.0 * Math.sin(angle);
                //lightSrc[2] = 3.0 * Math.cos(angle) + 3;

                cubes.forEach( (cube) => {
                    cube.rotateY(0.02);
                    cube.material.uniforms.lightSrc.value = lightSrc;
                });

                hexas.forEach( (hexa) => {
                    hexa.material.uniforms.lightSrc.value = lightSrc;
                });

                ground.material.uniforms.lightSrc.value = lightSrc;

                renderer.render(scene, camera);
            }

            function GenerateTexCube(){
                const cube_pos = [
                    new THREE.Vector3(-0.5, -0.5, -0.5),
                    new THREE.Vector3( 0.5, -0.5, -0.5),
                    new THREE.Vector3( 0.5,  0.5, -0.5),
                    new THREE.Vector3( -0.5,  0.5, -0.5),
                    new THREE.Vector3( -0.5, -0.5,  0.5),
                    new THREE.Vector3( 0.5, -0.5,  0.5),
                    new THREE.Vector3( 0.5,  0.5,  0.5),
                    new THREE.Vector3(-0.5,  0.5,  0.5),

                const cube_normal = [

                    new THREE.Vector3(0.57735, -0.57735,  0.57735),
                    new THREE.Vector3(0.57735,  0.57735,  0.57735),

                ];


                const cube_color = [

                    new THREE.Vector3(1, 0, 0),
                    new THREE.Vector3(1, 1, 0),
                    new THREE.Vector3(0, 1, 0),
                    new THREE.Vector3(0, 0, 1),
                    new THREE.Vector3(1, 0, 1),
                    new THREE.Vector3(1, 1, 1),
                    new THREE.Vector3(0, 1, 1),
                ];

                
                const cube_uv = [
                    new THREE.Vector2(0,0), 
                    new THREE.Vector2(0,1), 
                    new THREE.Vector2(1,1), 
                    new THREE.Vector2(1,0),  
                ];

                texQuad(1,0,3,2);
                texQuad(2,6,5,1);
                texQuad(3,7,6,2);
                texQuad(4,7,3,0);
                texQuad(5,4,0,1);
                texQuad(7,4,5,6);

                function texQuad(a,b,c,d){
                    vPosition.push(cube_pos[a]);
                    vNormal.push(cube_normal[a]);
                    vTexCoord.push(cube_uv[0]); 
                    vColor.push(cube_color[a]); 
                    
                    vPosition.push(cube_pos[b]);
                    vNormal.push(cube_normal[b]);
                    vTexCoord.push(cube_uv[1]); 
                    vColor.push(cube_color[b]); 
                    
                    vPosition.push(cube_pos[c]);
                    vNormal.push(cube_normal[c]);
                    vTexCoord.push(cube_uv[2]); 
                    vColor.push(cube_color[c]); 

                    vPosition.push(cube_pos[a]);
                    vNormal.push(cube_normal[a]);
                    vTexCoord.push(cube_uv[0]); 
                    vColor.push(cube_color[a]); 
                    
                    vPosition.push(cube_pos[c]);
                    vNormal.push(cube_normal[c]);
                    vTexCoord.push(cube_uv[2]); 
                    vColor.push(cube_color[a]); 

                    vPosition.push(cube_pos[d]);
                    vNormal.push(cube_normal[d]);
                    vTexCoord.push(cube_uv[3]);
                    vColor.push(cube_color[a]); 
                }
            }
        </script>
